<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quiz IoT">
<meta name="theme-color" content="#0f172a">
<title>Quizzer IoT - 362 domande</title>
<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --text: #111827;
  --muted: #64748b;
  --border: #dbe3ef;
  --primary: #2563eb;
  --primary2: #1d4ed8;
  --green: #138a37;
  --green-bg: #dff6e6;
  --red: #b91c1c;
  --red-bg: #fde2e2;
  --amber: #a16207;
  --amber-bg: #fef3c7;
  --shadow: 0 12px 30px rgba(15, 23, 42, 0.10);
  --radius: 18px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.45;
  -webkit-text-size-adjust: 100%;
}
.app {
  max-width: 980px;
  margin: 0 auto;
  padding: max(16px, env(safe-area-inset-top)) 14px 90px;
}
.header {
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  border-radius: 22px;
  padding: 18px;
  box-shadow: var(--shadow);
  margin-bottom: 14px;
}
.header h1 {
  margin: 0 0 8px;
  font-size: clamp(24px, 5vw, 40px);
  letter-spacing: -0.03em;
}
.header p { margin: 0; color: #dbeafe; }
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  margin: 14px 0;
}
.controls {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
@media (max-width: 760px) {
  .controls { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 460px) {
  .controls { grid-template-columns: 1fr; }
}
label.small {
  display: block;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 4px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
select, input[type="number"], input[type="text"] {
  width: 100%;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 16px;
  background: white;
  color: var(--text);
}
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
button {
  border: 0;
  border-radius: 14px;
  padding: 12px 14px;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
}
button.primary { background: var(--primary); color: white; }
button.primary:active { background: var(--primary2); }
button.secondary { background: #e2e8f0; color: #0f172a; }
button.good { background: var(--green); color: white; }
button.bad { background: var(--red); color: white; }
button.warn { background: #f59e0b; color: #111827; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
@media (max-width: 760px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
}
.stat {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
}
.stat .num { font-size: 22px; font-weight: 900; }
.stat .lbl { color: var(--muted); font-size: 12px; font-weight: 700; }
.progressOuter {
  width: 100%;
  height: 12px;
  border-radius: 999px;
  background: #e2e8f0;
  overflow: hidden;
  margin-top: 10px;
}
.progressInner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #2563eb);
  transition: width .25s ease;
}
.meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 8px 0 12px;
}
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 6px 10px;
  background: #eef2ff;
  color: #3730a3;
  font-size: 12px;
  font-weight: 800;
}
.pill.gray { background: #f1f5f9; color: #475569; }
.pill.green { background: var(--green-bg); color: var(--green); }
.pill.red { background: var(--red-bg); color: var(--red); }
.question {
  font-size: clamp(19px, 4vw, 27px);
  font-weight: 900;
  letter-spacing: -0.015em;
  margin: 8px 0 14px;
  white-space: pre-wrap;
}
.option {
  width: 100%;
  text-align: left;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  background: #f8fafc;
  border: 2px solid var(--border);
  color: var(--text);
  margin: 9px 0;
  border-radius: 16px;
  padding: 13px;
  font-weight: 650;
}
.option .badge {
  flex: 0 0 auto;
  min-width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #e2e8f0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
}
.option .txt { flex: 1 1 auto; white-space: pre-wrap; }
.option.selected {
  border-color: var(--primary);
  background: #eff6ff;
}
.option.correct {
  border-color: var(--green);
  background: var(--green-bg);
  color: #064e3b;
}
.option.wrong {
  border-color: var(--red);
  background: var(--red-bg);
  color: #7f1d1d;
}
.feedback {
  display: none;
  padding: 13px;
  border-radius: 16px;
  font-weight: 800;
  margin-top: 12px;
}
.feedback.good { display: block; background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }
.feedback.bad { display: block; background: var(--red-bg); color: var(--red); border: 1px solid #fecaca; }
.notes {
  display: none;
  background: var(--amber-bg);
  color: #713f12;
  border: 1px solid #fde68a;
  border-radius: 16px;
  padding: 12px;
  margin-top: 10px;
}
.notes.show { display: block; }
.notes ul { margin: 6px 0 0 18px; padding: 0; }
.footerNav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.96);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  padding: 10px max(12px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  z-index: 10;
}
.footerInner {
  max-width: 980px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr 1.2fr 1fr;
  gap: 8px;
}
@media (max-width: 560px) {
  .footerInner { grid-template-columns: 1fr 1fr; }
}
.hidden { display: none !important; }
.listPanel {
  max-height: 300px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px;
  background: #f8fafc;
}
.qMini {
  display: grid;
  grid-template-columns: 50px 1fr auto;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #e2e8f0;
  padding: 8px;
  cursor: pointer;
}
.qMini:last-child { border-bottom: 0; }
.qMini:hover { background: #eef2ff; }
.mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
.smallText { font-size: 13px; color: var(--muted); }
kbd {
  background: #e2e8f0;
  border-radius: 6px;
  padding: 1px 6px;
  font-size: 12px;
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.svg">

</head>
<body>
<div class="app">
  <section class="header">
    <h1>Quizzer IoT</h1>
    <p>Allenamento offline con tutte le domande. Scegli la risposta, correggi subito o usa modalità esame.</p>
  </section>

  <section class="card">
    <div class="controls">
      <div>
        <label class="small" for="topic">Argomento</label>
        <select id="topic"></select>
      </div>
      <div>
        <label class="small" for="mode">Modalità</label>
        <select id="mode">
          <option value="practice">Allenamento: correggi subito</option>
          <option value="exam">Esame: correzione alla fine</option>
          <option value="review">Ripasso: soluzioni visibili</option>
        </select>
      </div>
      <div>
        <label class="small" for="order">Ordine</label>
        <select id="order">
          <option value="normal">Normale</option>
          <option value="random">Casuale</option>
          <option value="wrong">Solo sbagliate</option>
          <option value="unanswered">Solo non risposte</option>
        </select>
      </div>
      <div>
        <label class="small" for="jump">Vai a domanda</label>
        <input id="jump" type="number" min="1" placeholder="1-362">
      </div>
    </div>
    <div class="row" style="margin-top:10px">
      <button class="primary" id="startBtn">Avvia / aggiorna quiz</button>
      <button class="secondary" id="shuffleBtn">Mescola</button>
      <button class="secondary" id="toggleListBtn">Lista domande</button>
      <button class="bad" id="resetBtn">Reset progressi</button>
    </div>
    <div id="listPanel" class="listPanel hidden" style="margin-top:12px"></div>
  </section>

  <section class="card">
    <div class="stats">
      <div class="stat"><div class="num" id="statIndex">0/0</div><div class="lbl">Posizione</div></div>
      <div class="stat"><div class="num" id="statAnswered">0</div><div class="lbl">Risposte</div></div>
      <div class="stat"><div class="num" id="statCorrect">0</div><div class="lbl">Corrette</div></div>
      <div class="stat"><div class="num" id="statWrong">0</div><div class="lbl">Sbagliate</div></div>
      <div class="stat"><div class="num" id="statScore">0%</div><div class="lbl">Percentuale</div></div>
    </div>
    <div class="progressOuter"><div class="progressInner" id="progress"></div></div>
  </section>

  <main class="card" id="quizCard">
    <div class="meta">
      <span class="pill" id="qNumber">Domanda</span>
      <span class="pill gray" id="qTopic">Argomento</span>
      <span class="pill gray" id="qSource">Fonte</span>
    </div>
    <div class="question" id="questionText">Premi “Avvia / aggiorna quiz” per iniziare.</div>
    <div id="options"></div>
    <div id="feedback" class="feedback"></div>
    <div id="notes" class="notes"></div>
  </main>
</div>

<nav class="footerNav">
  <div class="footerInner">
    <button class="secondary" id="prevBtn">← Indietro</button>
    <button class="primary" id="checkBtn">Correggi</button>
    <button class="good" id="showBtn">Mostra soluzione</button>
    <button class="secondary" id="nextBtn">Avanti →</button>
  </div>
</nav>

const STORAGE_KEY = "iot_quizzer_progress_v3";
let state = {
  topic: "Tutti",
  mode: "practice",
  order: "normal",
  ids: ALL_QUESTIONS.map(q => q.id),
  index: 0,
  answers: {},
  checked: {}
};

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      state = Object.assign(state, saved);
    }
  } catch(e) {}
}
function byId(id) { return ALL_QUESTIONS.find(q => q.id === id); }
function currentQ() { return byId(state.ids[state.index]); }
function topics() {
  const set = new Set(ALL_QUESTIONS.map(q => q.topic || "Senza argomento"));
  return ["Tutti", ...Array.from(set).sort()];
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sameSet(a, b) {
  if (!a || !b) return false;
  const A = [...a].sort().join("|");
  const B = [...b].sort().join("|");
  return A === B;
}
function correctLabels(q) {
  return q.options.filter(o => o.correct).map(o => o.label);
}
function selectedLabels(q) {
  return state.answers[q.id] || [];
}
function isAnswered(q) {
  return selectedLabels(q).length > 0;
}
function isCorrect(q) {
  return sameSet(selectedLabels(q), correctLabels(q));
}
function filteredIds() {
  let qs = ALL_QUESTIONS;
  if (state.topic !== "Tutti") qs = qs.filter(q => q.topic === state.topic);
  let ids = qs.map(q => q.id);
  if (state.order === "wrong") ids = ids.filter(id => state.answers[id] && !isCorrect(byId(id)));
  if (state.order === "unanswered") ids = ids.filter(id => !state.answers[id]);
  if (state.order === "random") ids = shuffle(ids);
  return ids;
}
function rebuildIds(resetIndex=true) {
  state.topic = document.getElementById("topic").value;
  state.mode = document.getElementById("mode").value;
  state.order = document.getElementById("order").value;
  state.ids = filteredIds();
  if (resetIndex) state.index = 0;
  if (state.index >= state.ids.length) state.index = Math.max(0, state.ids.length - 1);
  save();
  render();
}
function populateControls() {
  const topicSel = document.getElementById("topic");
  topicSel.innerHTML = "";
  for (const t of topics()) {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    topicSel.appendChild(opt);
  }
  topicSel.value = state.topic || "Tutti";
  document.getElementById("mode").value = state.mode || "practice";
  document.getElementById("order").value = state.order || "normal";
}
function renderStats() {
  const ids = state.ids || [];
  let answered = 0, correct = 0, wrong = 0;
  for (const id of ids) {
    const q = byId(id);
    if (isAnswered(q)) {
      answered++;
      if (isCorrect(q)) correct++; else wrong++;
    }
  }
  const score = answered ? Math.round(correct / answered * 100) : 0;
  document.getElementById("statIndex").textContent = ids.length ? (state.index + 1) + "/" + ids.length : "0/0";
  document.getElementById("statAnswered").textContent = answered;
  document.getElementById("statCorrect").textContent = correct;
  document.getElementById("statWrong").textContent = wrong;
  document.getElementById("statScore").textContent = score + "%";
  document.getElementById("progress").style.width = ids.length ? Math.round(((state.index + 1) / ids.length) * 100) + "%" : "0%";
}
function render() {
  renderStats();
  const q = currentQ();
  const optBox = document.getElementById("options");
  const feedback = document.getElementById("feedback");
  const notes = document.getElementById("notes");
  feedback.className = "feedback";
  feedback.textContent = "";
  notes.className = "notes";
  notes.innerHTML = "";
  optBox.innerHTML = "";
  document.getElementById("prevBtn").disabled = state.index <= 0;
  document.getElementById("nextBtn").disabled = state.index >= state.ids.length - 1;
  document.getElementById("checkBtn").disabled = !q || state.mode === "review";
  document.getElementById("showBtn").disabled = !q;

  if (!q) {
    document.getElementById("qNumber").textContent = "Nessuna domanda";
    document.getElementById("qTopic").textContent = "Cambia filtro";
    document.getElementById("qSource").textContent = "";
    document.getElementById("questionText").textContent = "Nessuna domanda trovata con questo filtro.";
    return;
  }
  document.getElementById("qNumber").textContent = "Domanda " + q.num;
  document.getElementById("qTopic").textContent = q.topic || "Senza argomento";
  document.getElementById("qSource").textContent = q.source || "";
  document.getElementById("questionText").textContent = q.question;

  const selected = selectedLabels(q);
  const shouldReveal = state.mode === "review" || state.checked[q.id] === true;
  for (const opt of q.options) {
    const btn = document.createElement("button");
    btn.className = "option";
    if (selected.includes(opt.label)) btn.classList.add("selected");
    if (shouldReveal && opt.correct) btn.classList.add("correct");
    if (shouldReveal && selected.includes(opt.label) && !opt.correct) btn.classList.add("wrong");
    btn.onclick = () => choose(opt.label);
    btn.innerHTML = `<span class="badge">${escapeHtml(opt.label)}</span><span class="txt">${escapeHtml(opt.text)}</span>`;
    optBox.appendChild(btn);
  }
  if (shouldReveal) {
    showFeedback(q);
  }
  if (q.notes && q.notes.length && shouldReveal) {
    notes.className = "notes show";
    notes.innerHTML = "<strong>Nota:</strong><ul>" + q.notes.map(n => "<li>" + escapeHtml(n) + "</li>").join("") + "</ul>";
  }
  updateListPanelIfOpen();
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
}
function choose(label) {
  const q = currentQ();
  if (!q) return;
  let selected = selectedLabels(q).slice();
  if (q.multi) {
    if (selected.includes(label)) selected = selected.filter(x => x !== label);
    else selected.push(label);
  } else {
    selected = [label];
  }
  state.answers[q.id] = selected;
  if (state.mode === "practice") state.checked[q.id] = true;
  save();
  render();
}
function showFeedback(q) {
  const feedback = document.getElementById("feedback");
  const correct = isCorrect(q);
  const labels = correctLabels(q).join(", ");
  const texts = q.options.filter(o => o.correct).map(o => o.text).join(" / ");
  feedback.className = "feedback " + (correct ? "good" : "bad");
  if (correct) feedback.textContent = "✅ Corretta.";
  else feedback.textContent = "❌ Sbagliata. Risposta corretta: " + labels + " — " + texts;
}
function checkCurrent() {
  const q = currentQ();
  if (!q) return;
  if (!isAnswered(q)) {
    alert("Scegli prima una risposta.");
    return;
  }
  state.checked[q.id] = true;
  save();
  render();
}
function showSolution() {
  const q = currentQ();
  if (!q) return;
  state.checked[q.id] = true;
  save();
  render();
}
function next() {
  if (state.index < state.ids.length - 1) {
    state.index++;
    save(); render();
  }
}
function prev() {
  if (state.index > 0) {
    state.index--;
    save(); render();
  }
}
function resetProgress() {
  if (!confirm("Vuoi cancellare tutte le risposte salvate?")) return;
  state.answers = {};
  state.checked = {};
  save();
  render();
}
function jumpToOriginalNum(num) {
  const idx = state.ids.findIndex(id => byId(id).num === num);
  if (idx >= 0) {
    state.index = idx;
    save(); render();
  } else {
    const q = ALL_QUESTIONS.find(x => x.num === num);
    if (q) {
      state.topic = "Tutti";
      state.order = "normal";
      populateControls();
      rebuildIds(false);
      state.index = state.ids.findIndex(id => id === q.id);
      save(); render();
    } else {
      alert("Domanda non trovata.");
    }
  }
}
function toggleList() {
  const p = document.getElementById("listPanel");
  p.classList.toggle("hidden");
  updateListPanelIfOpen(true);
}
function updateListPanelIfOpen(force=false) {
  const p = document.getElementById("listPanel");
  if (p.classList.contains("hidden") && !force) return;
  const rows = state.ids.map((id, idx) => {
    const q = byId(id);
    let status = "–";
    let cls = "pill gray";
    if (isAnswered(q)) {
      if (isCorrect(q)) { status = "ok"; cls = "pill green"; }
      else { status = "no"; cls = "pill red"; }
    }
    const short = q.question.length > 85 ? q.question.slice(0, 85) + "…" : q.question;
    return `<div class="qMini" onclick="goIndex(${idx})"><strong>#${q.num}</strong><span>${escapeHtml(short)}</span><span class="${cls}">${status}</span></div>`;
  }).join("");
  p.innerHTML = rows || "<div class='smallText'>Nessuna domanda.</div>";
}
function goIndex(i) {
  state.index = i;
  save();
  render();
}
window.goIndex = goIndex;
function finishExam() {
  if (state.mode !== "exam") return;
  if (!confirm("Vuoi correggere tutte le domande risposte in modalità esame?")) return;
  for (const id of state.ids) {
    if (state.answers[id]) state.checked[id] = true;
  }
  save(); render();
  alert("Esame corretto. Guarda punteggio e risposte.");
}
document.getElementById("startBtn").onclick = () => rebuildIds(true);
document.getElementById("shuffleBtn").onclick = () => {
  state.ids = shuffle(state.ids);
  state.index = 0;
  state.order = "random";
  document.getElementById("order").value = "random";
  save(); render();
};
document.getElementById("toggleListBtn").onclick = toggleList;
document.getElementById("resetBtn").onclick = resetProgress;
document.getElementById("prevBtn").onclick = prev;
document.getElementById("nextBtn").onclick = next;
document.getElementById("checkBtn").onclick = () => {
  if (state.mode === "exam") finishExam();
  else checkCurrent();
};
document.getElementById("showBtn").onclick = showSolution;
document.getElementById("topic").onchange = () => rebuildIds(true);
document.getElementById("mode").onchange = () => {
  state.mode = document.getElementById("mode").value;
  document.getElementById("checkBtn").textContent = state.mode === "exam" ? "Correggi esame" : "Correggi";
  save(); render();
};
document.getElementById("order").onchange = () => rebuildIds(true);
document.getElementById("jump").addEventListener("change", e => {
  const n = parseInt(e.target.value, 10);
  if (Number.isFinite(n)) jumpToOriginalNum(n);
  e.target.value = "";
});
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  const q = currentQ();
  if (!q) return;
  if (e.key >= "1" && e.key <= "9") {
    const opt = q.options.find(o => o.label === e.key);
    if (opt) choose(opt.label);
  }
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
  if (e.key === "Enter") checkCurrent();
  if (e.key.toLowerCase() === "s") showSolution();
});
load();
populateControls();
state.ids = filteredIds();
if (state.index >= state.ids.length) state.index = 0;
document.getElementById("checkBtn").textContent = state.mode === "exam" ? "Correggi esame" : "Correggi";
render();
</script>

<script>
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function(){});
  });
}
</script>
